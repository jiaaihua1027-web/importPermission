<!DOCTYPE html>
<html>
<head>
    <title>设计稿预览</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: #f0f0f0;
            font-family: Arial, sans-serif;
        }
        .container {
            max-width: 1600px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
        }
        h2 {
            margin-top: 40px;
            color: #333;
        }
        img {
            max-width: 100%;
            border: 1px solid #ddd;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>主界面设计稿 (main.png)</h2>
        <img src="main.png" alt="主界面">

        <h2>列表设计稿 (list.png)</h2>
        <img src="list.png" alt="列表界面">

        <h2>编组 10</h2>
        <img src="allpic/编组 10.png" alt="编组10">

        <h2>编组 20备份 2</h2>
        <img src="allpic/编组 20备份 2.png" alt="编组20">
    </div>
</body>
</html>
